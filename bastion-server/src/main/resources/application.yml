server:
  port: 8080

bastion:
  registry:
    ttl-seconds: 45
    cleanup-interval-ms: 10000
  connection:
    token-ttl-seconds: 120
    cleanup-interval-ms: 30000
    default-mode: mosh
    server-public-key: ${BASTION_SERVER_PUBLIC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info
