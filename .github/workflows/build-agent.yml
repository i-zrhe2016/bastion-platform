name: Build bastion-agent

on:
  push:
    branches: [main]
    paths:
      - 'bastion-agent/**'
      - '.github/workflows/build-agent.yml'
  pull_request:
    paths:
      - 'bastion-agent/**'
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    name: Build x86_64-unknown-linux-musl
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bastion-agent/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('bastion-agent/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        working-directory: bastion-agent
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Rename binary
        run: |
          mkdir -p dist
          cp bastion-agent/target/x86_64-unknown-linux-musl/release/bastion-agent \
             dist/bastion-agent-x86_64-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bastion-agent-x86_64-linux
          path: dist/bastion-agent-x86_64-linux
          retention-days: 30

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bastion-agent-x86_64-linux
